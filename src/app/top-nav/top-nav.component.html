<nav class="space-between row">
  <span> </span>
  <span id="bars" (click)="toggleNav()">
    <svg
      id="Layer_1"
      data-name="Layer 1"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 14"
      class="center"
    >
      <title>menu</title>
      <line class="cls-1" x1="1" y1="7" x2="19" y2="7" />
      <line class="cls-1" x1="1" y1="1" x2="19" y2="1" />
      <line class="cls-1" x1="1" y1="13" x2="19" y2="13" />
    </svg>
  </span>
  <span class="center-vertical row links" [ngClass]="navOpen ? 'nav-open' : ''">
    <!-- (click)="setActive(i, true)" -->
    <a
      class="center link"
      [href]="'#' + link.text"
      [ngClass]="link.isActive ? 'link-active' : ''"
      *ngFor="let link of links; index as i"
      [id]="link.text + '-link'"
    >
      {{ link.text | titlecase }}
    </a>
  </span>
</nav>
