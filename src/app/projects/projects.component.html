<h1 id="projects">Projects</h1>
<section class="row">
  <div
    class="project-container column"
    *ngFor="let project of projects; index as i"
  >
    <img
      [src]="'./assets/Graphics/' + project.imgLink"
      [alt]="project.name"
      class="project-img bg-img"
    />
    <img
      [src]="'./assets/Graphics/' + project.imgLink"
      [alt]="project.name"
      class="project-img clip-img"
    />
    <div class="text-container row space-between">
      <div class="column">
        <h2>{{ project.name }}</h2>
        <p>{{ project.description }}</p>
      </div>

      <div class="column">
        <!-- <button class="play center row">
                    <h3>Demo</h3>

                    <i class="fas fa-play"></i>
                </button> -->
        <a class="link row center" [href]="project.link" target="_blank">
          Github
          <i class="fab fa-github"></i>
        </a>
      </div>
    </div>
  </div>
</section>
