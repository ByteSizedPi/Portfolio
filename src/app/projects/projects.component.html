<h1 id="projects">Projects</h1>
<section class="row">
  <div class="project-container" *ngFor="let project of projects; index as i">
    <img
      [src]="'./assets/images/' + project.imgLink"
      (load)="onLoad($event)"
      [alt]="project.name"
      class="bg-img"
    />
    <img
      [src]="'./assets/images/' + project.imgLink"
      (load)="onLoad($event)"
      [alt]="project.name"
      class="clip-img"
    />

    <div class="info-container">
      <i class="fas fa-info center"></i>

      <div class="text-container row space-between">
        <div class="column">
          <h2>{{ project.name }}</h2>
          <p>{{ project.description }}</p>

          <div class="row bottom">
            <a class="link row center" [href]="project.link" target="_blank">
              Github
              <i class="fab fa-github"></i>
            </a>

            <!-- <button class="play center row">
              <h3>Demo</h3>

              <i class="fas fa-play"></i>
            </button> -->
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
